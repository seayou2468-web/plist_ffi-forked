# language: 出力するヘッダの言語
language = "C"

# 追加の C ヘッダを出力する（角括弧形式）
includes = ["<stdio.h>"]

# 追加のシステムヘッダ
sys_includes = []

# 標準インクルードを抑制するか
no_includes = false

# 出力ファイル先頭に入れるテキスト
header = ""

# 出力ファイル末尾に入れるテキスト
trailer = ""

# Include guard 名
include_guard = ""

# #pragma once を付けるか
pragma_once = true

# バージョン情報を含めるか
include_version = true

# 自動生成警告文
autogen_warning = "/* autogenerated by cbindgen */"

# --- 以下はカスタマイズしたい場合に使う ---

# preprocessor defines（feature names）
[defines]
danger = ""
 
# parse オプション
[parse]
parse_deps = true