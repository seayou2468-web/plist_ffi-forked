#------------------------------------------------------------------------------
# cbindgen.toml -- plist_ffi 用ヘッダ生成設定
# cbindgen 0.29.x 対応版
#------------------------------------------------------------------------------

# 出力言語
language = "C"

# ヘッダに追加する include（FILE 型対応）
includes = ["<stdio.h>"]
sys_includes = []

# Include guard / pragma once
include_guard = "PLIST_FFI_H"
pragma_once = true

# 自動生成警告
autogen_warning = "/* autogenerated by cbindgen */"

# バージョン情報
include_version = true
no_includes = false

# ヘッダ先頭／末尾固定文字列
header = ""
trailer = ""

# Defines（feature 名など）
[defines]
danger = ""

# Parse オプション
[parse]
# 依存クレートは解析しない
parse_deps = false

# 0.29 系では only_target_dependencies は存在しないため削除