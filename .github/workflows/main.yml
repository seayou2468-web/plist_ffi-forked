name: iOS Device Build (plist_ffi Artifacts)

on:
  workflow_dispatch:  # 手動実行用

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Install Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      # 3️⃣ Add iOS device target
      - run: rustup target add aarch64-apple-ios

      # 4️⃣ Install cbindgen
      - run: cargo install cbindgen --version "^0.29"

      # 5️⃣ Set Xcode
      - run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # 6️⃣ Build Rust FFI for iOS device
      - run: cargo build --release --target aarch64-apple-ios --features danger

      # 7️⃣ Generate C headers
      - run: cbindgen --crate plist_ffi --output plist.h --lang C --include-version

      # 8️⃣ (任意) Compile C shims
      - run: |
          clang \
            -Iinclude \
            -Ilibcnary/include \
            -Wall -Wextra \
            src/shims.c \
            -o plist_shims

      # 9️⃣ Upload artifacts (ライブラリとヘッダ)
      - uses: actions/upload-artifact@v4
        with:
          name: plist_ffi-ios-artifacts
          path: |
            target/aarch64-apple-ios/release/libplist_ffi.a
            plist.h
            plist_shims
