name: iOS Device Build (plist_ffi Artifacts)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Install Rust
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          profile: minimal

      # 3️⃣ Add iOS device target
      - run: rustup target add aarch64-apple-ios

      # 4️⃣ Setup official Xcode action
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.1'   # iOS 26 SDK 対応 Xcode

      # 5️⃣ Install cbindgen
      - run: cargo install cbindgen --version "^0.29"

      # 6️⃣ Build Rust FFI
      - name: Build plist_ffi
        run: cargo build --release --target aarch64-apple-ios --features danger

      # 7️⃣ Generate C headers
　　　　- name: Generate plist.h
        run: cbindgen --crate plist_ffi --output plist.h --lang C --package-version

      # 8️⃣ (任意) Compile C shims
      # - run: |
      #     clang \
      #       -isysroot /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.1.sdk \
      #       -Iinclude \
      #       -Ilibcnary/include \
      #       -Wall -Wextra \
      #       src/shims.c \
      #       -o plist_shims

      # 9️⃣ Upload artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: plist_ffi-ios-artifacts
          path: |
            target/aarch64-apple-ios/release/libplist_ffi.a
            plist.h
            # plist_shims  # shims をビルドした場合のみ